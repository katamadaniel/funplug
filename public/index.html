<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- BASIC -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- TITLE (CRITICAL) -->
    <title>
      FunPlug | Event Booking, Ticketing & Talent Marketplace
    </title>

    <!-- PRIMARY META -->
    <meta
      name="description"
      content="FunPlug is an all-in-one event booking and ticketing platform. Discover events, book performers and vendors, manage venues, and sell tickets seamlessly."
    />
    <meta
      name="keywords"
      content="events, event venue, event booking, event tickets, event ticketing Kenya, hire entertainment, book event vendor services, event management system"
    />
    <meta name="author" content="FunPlug" />
    <meta name="theme-color" content="#000000" />

    <!-- CANONICAL -->
    <link rel="canonical" href="https://www.funplug.net/" />

    <!-- FAVICONS -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/FunPlug.png" />

    <!-- STYLES -->
    <link rel="stylesheet" href="style.css" />
    <link
      rel="preconnect"
      href="https://cdnjs.cloudflare.com"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />

    <!-- OPEN GRAPH (SOCIAL SHARING) -->
    <meta property="og:site_name" content="FunPlug" />
    <meta property="og:title" content="FunPlug | Everything Events in One Platform" />
    <meta
      property="og:description"
      content="Book events, performers, vendors and sell tickets effortlessly with FunPlug."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.funplug.net/" />
    <meta property="og:image" content="%PUBLIC_URL%/FunPlug.png" />

    <!-- TWITTER -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FunPlug | Event Booking & Ticketing" />
    <meta
      name="twitter:description"
      content="Discover events, book talent, vendors and venues — all in one trusted platform."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/FunPlug.png" />

    <!-- MANIFEST -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- STRUCTURED DATA (ORG) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "FunPlug",
        "url": "https://www.funplug.net",
        "logo": "https://www.funplug.net/FunPlug.png",
        "description": "Event booking and ticketing marketplace for performers, vendors, venues and event hosts.",
        "sameAs": []
      }
    </script>
  </head>

  <body>
    <noscript>
      FunPlug helps you discover events, book performers and vendors, and sell tickets —
      please enable JavaScript to continue.
    </noscript>

    <div id="root"></div>
  </body>
</html>
